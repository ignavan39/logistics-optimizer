syntax = "proto3";

package routing;

service RoutingService {
  rpc CalculateRoute(CalculateRouteRequest) returns (CalculateRouteResponse);
  rpc GetRoute(GetRouteRequest) returns (GetRouteResponse);
  rpc CalculateETA(CalculateETARequest) returns (CalculateETAResponse);
}

message CalculateRouteRequest {
  string order_id = 1;
  string vehicle_id = 2;
  GeoPoint origin = 3;
  GeoPoint destination = 4;
}

message CalculateRouteResponse {
  string route_id = 1;
  int64 distance_meters = 2;
  int64 duration_seconds = 3;
  repeated GeoPoint waypoints = 4;
}

message GetRouteRequest {
  string route_id = 1;
}

message GetRouteResponse {
  Route route = 1;
}

message CalculateETARequest {
  string route_id = 1;
  string vehicle_id = 2;
  GeoPoint current_position = 3;
}

message CalculateETAResponse {
  int64 eta_seconds = 1;
  int64 distance_remaining_meters = 2;
}

message Route {
  string id = 1;
  string order_id = 2;
  string vehicle_id = 3;
  GeoPoint origin = 4;
  GeoPoint destination = 5;
  int64 distance_meters = 6;
  int64 duration_seconds = 7;
  repeated GeoPoint waypoints = 8;
  string status = 9;
  int64 created_at = 10;
}

message GeoPoint {
  float lat = 1;
  float lng = 2;
}