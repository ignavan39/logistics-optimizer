syntax = "proto3";

package routing;

// ─────────────────────────────────────────────────────────────
// Routing Service — gRPC contract
// Used by: dispatcher-service → routing-service (critical path, low latency)
// ─────────────────────────────────────────────────────────────

service RoutingService {
  rpc CalculateRoute (CalculateRouteRequest) returns (RouteResponse);
  rpc GetRoute (GetRouteRequest) returns (RouteResponse);
  rpc RecalculateRoute (RecalculateRouteRequest) returns (RouteResponse);
  rpc GetEta (GetEtaRequest) returns (GetEtaResponse);
  // Bidirectional stream: client sends vehicle positions, server pushes ETA updates
  rpc StreamEtaUpdates (stream EtaUpdateRequest) returns (stream EtaUpdateResponse);
}

message GeoPoint {
  double lat = 1;
  double lng = 2;
}

message RouteSegment {
  GeoPoint from          = 1;
  GeoPoint to            = 2;
  double distance_km     = 3;
  int32  duration_sec    = 4;
  string road_name       = 5;
  double traffic_factor  = 6; // 1.0 = normal, 2.0 = doubled travel time
}

message RouteResponse {
  string id                        = 1;
  string order_id                  = 2;
  string vehicle_id                = 3;
  GeoPoint origin                  = 4;
  GeoPoint destination             = 5;
  repeated RouteSegment segments   = 6;
  double total_distance_km         = 7;
  int32  total_duration_sec        = 8;
  int64  estimated_arrival_unix    = 9;
  string polyline                  = 10; // encoded polyline for frontend
  int64  calculated_at_unix        = 11;
  bool   is_stale                  = 12; // needs recalculation
}

message CalculateRouteRequest {
  string order_id    = 1;
  string vehicle_id  = 2;
  GeoPoint origin    = 3;
  GeoPoint destination = 4;
  bool avoid_tolls   = 5;
  bool avoid_highways = 6;
}

message GetRouteRequest {
  string route_id = 1;
}

message RecalculateRouteRequest {
  string route_id    = 1;
  string reason      = 2; // "traffic_incident" | "vehicle_deviated" | "manual"
  GeoPoint current_vehicle_pos = 3;
}

message GetEtaRequest {
  string route_id  = 1;
  GeoPoint current_vehicle_pos = 2;
}

message GetEtaResponse {
  string route_id             = 1;
  int64  estimated_arrival_unix = 2;
  int32  remaining_distance_m   = 3;
  int32  remaining_duration_sec = 4;
  double traffic_delay_factor   = 5;
}

message EtaUpdateRequest {
  string vehicle_id = 1;
  string route_id   = 2;
  GeoPoint position = 3;
  double speed_kmh  = 4;
  int64  timestamp_unix = 5;
}

message EtaUpdateResponse {
  string route_id             = 1;
  int64  new_eta_unix         = 2;
  int32  remaining_distance_m = 3;
  bool   needs_reroute        = 4;
}
