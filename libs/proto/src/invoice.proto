syntax = "proto3";

package invoice;

option java_multiple_files = true;

// ─────────────────────────────────────────────────────────────
// Invoice Service — gRPC contract
// Used by: api-gateway → invoice-service
// Dependencies: order-service, counterparty-service
// ─────────────────────────────────────────────────────────────

service InvoiceService {
  rpc GetInvoice (GetInvoiceRequest) returns (InvoiceResponse);
  rpc GetInvoiceByOrder (GetInvoiceByOrderRequest) returns (InvoiceResponse);
  rpc ListInvoices (ListInvoicesRequest) returns (ListInvoicesResponse);
  rpc CreateInvoice (CreateInvoiceRequest) returns (InvoiceResponse);
  rpc UpdateInvoiceStatus (UpdateInvoiceStatusRequest) returns (InvoiceResponse);
  rpc GetInvoicePdfUrl (GetInvoicePdfUrlRequest) returns (GetInvoicePdfUrlResponse);
}

// ── Enums ──

enum InvoiceStatus {
  INVOICE_STATUS_UNSPECIFIED = 0;
  INVOICE_STATUS_DRAFT = 1;
  INVOICE_STATUS_SENT = 2;
  INVOICE_STATUS_PAID = 3;
  INVOICE_STATUS_OVERDUE = 4;
  INVOICE_STATUS_CANCELLED = 5;
}

enum InvoiceType {
  INVOICE_TYPE_UNSPECIFIED = 0;
  INVOICE_TYPE_INVOICE = 1;
  INVOICE_TYPE_ACT = 2;
  INVOICE_TYPE_FACTURA = 3;
}

// ── Messages ──

message GetInvoiceRequest {
  string invoice_id = 1;
}

message GetInvoiceByOrderRequest {
  string order_id = 1;
}

message ListInvoicesRequest {
  string counterparty_id = 1;
  InvoiceStatus status = 2;
  int32 page = 3;
  int32 limit = 4;
}

message CreateInvoiceRequest {
  string order_id = 1;
  string number = 2;
  InvoiceType type = 3;
  int64 amount_rub = 4;
  int64 vat_rate = 5;
  int64 vat_amount = 6;
  int64 due_date = 7;
  string counterparty_id = 8;
  string contract_id = 9;
  string description = 10;
}

message UpdateInvoiceStatusRequest {
  string invoice_id = 1;
  InvoiceStatus status = 2;
  int32 expected_version = 3;
}

message InvoiceResponse {
  string id = 1;
  string order_id = 2;
  string number = 3;
  InvoiceType type = 4;
  int64 amount_rub = 5;
  int64 vat_rate = 6;
  int64 vat_amount = 7;
  InvoiceStatus status = 8;
  int64 due_date = 9;
  int64 paid_at = 10;
  string counterparty_id = 11;
  string contract_id = 12;
  string description = 13;
  int64 created_at = 14;
  int32 version = 15;
}

message ListInvoicesResponse {
  repeated InvoiceResponse invoices = 1;
  int32 total = 2;
  int32 page = 3;
}

message GetInvoicePdfUrlRequest {
  string invoice_id = 1;
}

message GetInvoicePdfUrlResponse {
  string url = 1;
}