syntax = "proto3";

package fleet;

service FleetService {
  rpc GetAvailableVehicles(GetAvailableVehiclesRequest) returns (GetAvailableVehiclesResponse);
  rpc GetVehicle(GetVehicleRequest) returns (GetVehicleResponse);
  rpc GetVehicleDetails(GetVehicleRequest) returns (GetVehicleDetailsResponse);
  rpc UpdateVehicle(UpdateVehicleRequest) returns (UpdateVehicleResponse);
  rpc AssignVehicle(AssignVehicleRequest) returns (AssignVehicleResponse);
  rpc ReleaseVehicle(ReleaseVehicleRequest) returns (ReleaseVehicleResponse);
  rpc GetVehicleLocation(GetVehicleLocationRequest) returns (stream VehicleLocation);
}

message GetAvailableVehiclesRequest {
  GeoPoint near_point = 1;
  float radius_km = 2;
  int32 min_capacity_kg = 3;
  int32 min_capacity_m3 = 4;
  int32 limit = 5;
}

message GetAvailableVehiclesResponse {
  repeated Vehicle vehicles = 1;
}

message GetVehicleRequest {
  string vehicle_id = 1;
}

message GetVehicleResponse {
  Vehicle vehicle = 1;
}

message GetVehicleDetailsResponse {
  VehicleDetails vehicle = 1;
}

message UpdateVehicleRequest {
  string vehicle_id = 1;
  VehicleType type = 2;
  int32 capacity_kg = 3;
  float capacity_m3 = 4;
  float current_lat = 5;
  float current_lng = 6;
  int32 expected_version = 7;
}

message UpdateVehicleResponse {
  bool success = 1;
  string message = 2;
  VehicleDetails vehicle = 3;
}

message VehicleDetails {
  string id = 1;
  VehicleType type = 2;
  int32 capacity_kg = 3;
  float capacity_m3 = 4;
  string status = 5;
  float current_lat = 6;
  float current_lng = 7;
  string current_driver_id = 8;
  string current_order_id = 9;
  int64 last_update = 10;
  int32 version = 11;
  int64 created_at = 12;
  DriverInfo driver = 13;
  OrderInfo order = 14;
}

message DriverInfo {
  string id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  string phone = 5;
}

message OrderInfo {
  string id = 1;
  string status = 2;
  string priority = 3;
  string pickup_address = 4;
  string delivery_address = 5;
  int64 created_at = 6;
}

message AssignVehicleRequest {
  string vehicle_id = 1;
  string order_id = 2;
  int32 expected_version = 3;
}

message AssignVehicleResponse {
  bool success = 1;
  string message = 2;
}

message ReleaseVehicleRequest {
  string vehicle_id = 1;
  string order_id = 2;
}

message ReleaseVehicleResponse {
  bool success = 1;
}

message GetVehicleLocationRequest {
  string vehicle_id = 1;
}

message VehicleLocation {
  string vehicle_id = 1;
  float lat = 2;
  float lng = 3;
  float heading_deg = 4;
  float speed_kmh = 5;
  int64 timestamp = 6;
}

message Vehicle {
  string id = 1;
  VehicleType type = 2;
  int32 capacity_kg = 3;
  float capacity_m3 = 4;
  string status = 5;
  int32 version = 6;
  GeoPoint current_location = 7;
  int64 last_update = 8;
}

enum VehicleType {
  VEHICLE_TYPE_UNSPECIFIED = 0;
  VEHICLE_TYPE_CAR = 1;
  VEHICLE_TYPE_VAN = 2;
  VEHICLE_TYPE_TRUCK = 3;
}

message GeoPoint {
  float lat = 1;
  float lng = 2;
}