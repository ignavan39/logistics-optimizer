syntax = "proto3";

package order;

option java_multiple_files = true;

// ─────────────────────────────────────────────────────────────
// Order Service — gRPC contract
// Used by: api-gateway → order-service, dispatcher-service → order-service
// ─────────────────────────────────────────────────────────────

service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder (GetOrderRequest) returns (OrderResponse);
  rpc GetOrderHistory (GetOrderRequest) returns (GetOrderHistoryResponse);
  rpc ListOrders (ListOrdersRequest) returns (ListOrdersResponse);
  rpc UpdateOrderStatus (UpdateOrderStatusRequest) returns (OrderResponse);
  rpc CancelOrder (CancelOrderRequest) returns (OrderResponse);
  rpc GetInvoice (GetInvoiceRequest) returns (InvoiceResponse);
  rpc GetInvoiceByOrder (GetInvoiceByOrderRequest) returns (InvoiceResponse);
  rpc ListInvoices (ListInvoicesRequest) returns (ListInvoicesResponse);
  rpc UpdateInvoiceStatus (UpdateInvoiceStatusRequest) returns (InvoiceResponse);
  rpc GetCompanySettings (GetCompanySettingsRequest) returns (GetCompanySettingsResponse);
  rpc GetSetting (GetSettingRequest) returns (GetSettingResponse);
  rpc SetSetting (SetSettingRequest) returns (GetSettingResponse);
  rpc UpdateCompanySettings (UpdateCompanySettingsRequest) returns (GetCompanySettingsResponse);
  rpc GetStatuses (GetStatusesRequest) returns (GetStatusesResponse);
}

// ── Enums ──

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING     = 1;
  ORDER_STATUS_ASSIGNED    = 2;
  ORDER_STATUS_PICKED_UP   = 3;
  ORDER_STATUS_IN_TRANSIT  = 4;
  ORDER_STATUS_DELIVERED   = 5;
  ORDER_STATUS_FAILED      = 6;
  ORDER_STATUS_CANCELLED   = 7;
}

enum OrderPriority {
  ORDER_PRIORITY_NORMAL   = 0;
  ORDER_PRIORITY_HIGH     = 1;
  ORDER_PRIORITY_CRITICAL = 2;
}

// ── Messages ──

message GeoPoint {
  double lat = 1;
  double lng = 2;
  string address = 3;
}

message CreateOrderRequest {
  string customer_id  = 1;
  GeoPoint origin     = 2;
  GeoPoint destination = 3;
  OrderPriority priority = 4;
  double weight_kg    = 5;
  double volume_m3    = 6;
  string notes        = 7;
  int64 sla_deadline_unix = 8; // unix timestamp
}

message GetOrderRequest {
  string order_id = 1;
}

message ListOrdersRequest {
  string customer_id = 1;
  OrderStatus status = 2;
  int32 page  = 3;
  int32 limit = 4;
}

message UpdateOrderStatusRequest {
  string order_id    = 1;
  OrderStatus status = 2;
  string reason      = 3;
  string updated_by  = 4; // service name for audit
}

message CancelOrderRequest {
  string order_id = 1;
  string reason   = 2;
}

message OrderResponse {
  string id           = 1;
  string customer_id  = 2;
  GeoPoint origin     = 3;
  GeoPoint destination = 4;
  OrderStatus status  = 5;
  OrderPriority priority = 6;
  double weight_kg    = 7;
  double volume_m3    = 8;
  string notes        = 9;
  string vehicle_id   = 10;
  string driver_id    = 11;
  string route_id     = 12;
  int64 sla_deadline_unix = 13;
  int64 created_at_unix   = 14;
  int64 updated_at_unix   = 15;
  int32 version           = 16; // optimistic locking
}

message ListOrdersResponse {
  repeated OrderResponse orders = 1;
  int32 total = 2;
  int32 page  = 3;
}

message OrderStatusHistory {
  string id = 1;
  string order_id = 2;
  string previous_status = 3;
  string new_status = 4;
  string changed_by = 5;
  string reason = 6;
  int64 created_at_unix = 7;
}

message GetOrderHistoryResponse {
  repeated OrderStatusHistory history = 1;
}

// ── Invoice ──

enum InvoiceStatus {
  INVOICE_STATUS_UNSPECIFIED = 0;
  INVOICE_STATUS_DRAFT = 1;
  INVOICE_STATUS_SENT = 2;
  INVOICE_STATUS_PAID = 3;
  INVOICE_STATUS_OVERDUE = 4;
  INVOICE_STATUS_CANCELLED = 5;
}

enum InvoiceType {
  INVOICE_TYPE_UNSPECIFIED = 0;
  INVOICE_TYPE_INVOICE = 1;
  INVOICE_TYPE_ACT = 2;
  INVOICE_TYPE_FACTURA = 3;
}

message GetInvoiceRequest {
  string invoice_id = 1;
}

message GetInvoiceByOrderRequest {
  string order_id = 1;
}

message ListInvoicesRequest {
  string counterparty_id = 1;
  InvoiceStatus status = 2;
  int32 page = 3;
  int32 limit = 4;
}

message UpdateInvoiceStatusRequest {
  string invoice_id = 1;
  InvoiceStatus status = 2;
  int32 expected_version = 3;
}

message InvoiceResponse {
  string id = 1;
  string order_id = 2;
  string number = 3;
  InvoiceType type = 4;
  int64 amount_rub = 5;
  int64 vat_rate = 6;
  int64 vat_amount = 7;
  InvoiceStatus status = 8;
  int64 due_date = 9;
  int64 paid_at = 10;
  string counterparty_id = 11;
  string contract_id = 12;
  int64 created_at = 13;
  int32 version = 14;
}

message ListInvoicesResponse {
  repeated InvoiceResponse invoices = 1;
  int32 total = 2;
  int32 page = 3;
}

// ── Settings ──

message GetCompanySettingsRequest {}

message GetCompanySettingsResponse {
  string company_name = 1;
  string company_inn = 2;
  string company_kpp = 3;
  string company_address = 4;
  string company_phone = 5;
  string company_email = 6;
  int32 default_payment_terms_days = 7;
  int32 default_vat_rate = 8;
}

message GetSettingRequest {
  string key = 1;
}

message GetSettingResponse {
  string key = 1;
  string value = 2;
}

message SetSettingRequest {
  string key = 1;
  string value = 2;
}

message SetSettingResponse {
  string key = 1;
  string value = 2;
}

message UpdateCompanySettingsRequest {
  string company_name = 1;
  string company_inn = 2;
  string company_kpp = 3;
  string company_address = 4;
  string company_phone = 5;
  string company_email = 6;
  int32 default_payment_terms_days = 7;
  int32 default_vat_rate = 8;
}

// ── Statuses ──

message GetStatusesRequest {}

message GetStatusesResponse {
  repeated OrderStatusInfo statuses = 1;
}

message OrderStatusInfo {
  int32 value = 1;
  string key = 2;
  string label = 3;
}
