networks:
  logistics-net:
    external: true

x-service-common: &service-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file: .env
  networks:
    - logistics-net
  depends_on:
    pg-order:
      condition: service_healthy
    kafka:
      condition: service_healthy
    kafka-init:
      condition: service_completed_successfully

services:
  api-gateway:
    <<: *service-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
    ports:
      - '${HTTP_GATEWAY_PORT:-3000}:3000'
      - '9410:9414'
    environment:
      SERVICE_NAME: api-gateway
      HTTP_PORT: 3000
      HTTP_METRICS_PORT: 9414
      GRPC_ORDER_HOST: order-service:50051
      GRPC_FLEET_HOST: fleet-service:50052
      GRPC_ROUTING_HOST: routing-service:50053
      GRPC_TRACKING_HOST: tracking-service:50054
      GRPC_DISPATCHER_HOST: dispatcher-service:50055
      GRPC_COUNTERPARTY_HOST: counterparty-service:50056
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      order-service:
        condition: service_started
      counterparty-service:
        condition: service_started

  order-service:
    <<: *service-common
    build:
      args: { SERVICE: order-service }
    ports:
      - '3011:3011'
      - '50051:50051'
      - '9411:9414'
    environment:
      SERVICE_NAME: order-service
      HTTP_PORT: 3011
      HTTP_METRICS_PORT: 9414
      GRPC_ORDER_PORT: 50051
      ORDER_DB_HOST: pg-order
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      pg-order:
        condition: service_healthy

  fleet-service:
    <<: *service-common
    build:
      args: { SERVICE: fleet-service }
    ports:
      - '3012:3012'
      - '50052:50052'
      - '9412:9414'
    environment:
      SERVICE_NAME: fleet-service
      HTTP_PORT: 3012
      HTTP_METRICS_PORT: 9414
      GRPC_FLEET_PORT: 50052
      FLEET_DB_HOST: pg-fleet
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      pg-fleet:
        condition: service_healthy

  routing-service:
    <<: *service-common
    build:
      args: { SERVICE: routing-service }
    ports:
      - '3013:3013'
      - '50053:50053'
      - '9413:9414'
    environment:
      SERVICE_NAME: routing-service
      HTTP_PORT: 3013
      HTTP_METRICS_PORT: 9414
      GRPC_ROUTING_PORT: 50053
      ROUTING_DB_HOST: pg-routing
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      pg-routing:
        condition: service_healthy

  tracking-service:
    <<: *service-common
    build:
      args: { SERVICE: tracking-service }
    ports:
      - '50054:50054'
      - '9414:9414'
    environment:
      SERVICE_NAME: tracking-service
      HTTP_METRICS_PORT: 9414
      GRPC_TRACKING_PORT: 50054
      TRACKING_DB_HOST: pg-tracking
      TRACKING_BATCH_SIZE: 500
      TRACKING_BATCH_TIMEOUT_MS: 200
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      pg-tracking:
        condition: service_healthy

  dispatcher-service:
    <<: *service-common
    build:
      args: { SERVICE: dispatcher-service }
    ports:
      - '50055:50055'
      - '9415:9414'
    environment:
      SERVICE_NAME: dispatcher-service
      HTTP_METRICS_PORT: 9414
      GRPC_DISPATCHER_PORT: 50055
      DISPATCHER_DB_HOST: pg-dispatcher
      GRPC_ORDER_HOST: order-service:50051
      GRPC_FLEET_HOST: fleet-service:50052
      GRPC_ROUTING_HOST: routing-service:50053
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      pg-dispatcher:
        condition: service_healthy
      order-service:
        condition: service_started
      fleet-service:
        condition: service_started
      routing-service:
        condition: service_started

  counterparty-service:
    <<: *service-common
    build:
      args: { SERVICE: counterparty-service }
    ports:
      - '3016:3016'
      - '50056:50056'
      - '9416:9414'
    environment:
      SERVICE_NAME: counterparty-service
      HTTP_PORT: 3016
      HTTP_METRICS_PORT: 9414
      GRPC_COUNTERPARTY_PORT: 50056
      COUNTERPARTY_DB_HOST: pg-counterparty
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      pg-counterparty:
        condition: service_healthy

  telemetry-sim:
    image: node:20-alpine
    working_dir: /app
    command: node telemetry-sim.js
    volumes:
      - ./infra/telemetry-sim:/app:ro
    environment:
      KAFKA_BROKER: kafka:9092
      SIM_VEHICLE_COUNT: ${SIM_VEHICLE_COUNT:-300}
      SIM_TELEMETRY_HZ: ${SIM_TELEMETRY_HZ:-2}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - logistics-net
    profiles:
      - simulation

  traffic-sim:
    image: node:20-alpine
    working_dir: /app
    command: node traffic-sim.js
    volumes:
      - ./infra/traffic-sim:/app:ro
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - logistics-net
    profiles:
      - simulation