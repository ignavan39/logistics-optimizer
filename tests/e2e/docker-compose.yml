networks:
  logistics-net:
    external: true

services:

  pg-test-order:
    image: postgis/postgis:16-3.4
    container_name: logistics-pg-test-order
    restart: no
    environment:
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD: logistics_secret
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: order_db_test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U logistics']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - logistics-net
    volumes:
      - pg-test-order-data:/var/lib/postgresql/data
      - ../infra/postgres/init-order.sql:/docker-entrypoint-initdb.d/init.sql:ro

  pg-test-fleet:
    image: postgis/postgis:16-3.4
    container_name: logistics-pg-test-fleet
    restart: no
    environment:
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD: logistics_secret
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: fleet_db_test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U logistics']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - logistics-net
    volumes:
      - pg-test-fleet-data:/var/lib/postgresql/data
      - ../infra/postgres/init-fleet.sql:/docker-entrypoint-initdb.d/init.sql:ro

  pg-test-routing:
