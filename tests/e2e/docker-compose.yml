      POSTGRES_PASSWORD: logistics_secret
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: dispatcher_db_test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U logistics']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - logistics-net
    volumes:
      - pg-test-dispatcher-data:/var/lib/postgresql/data

  pg-test-counterparty:
    image: postgis/postgis:16-3.4
    container_name: logistics-pg-test-counterparty
    restart: no
